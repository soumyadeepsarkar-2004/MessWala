version: '3.8'

services:
  mongodb:
    image: mongo:7-alpine
    container_name: messwala-db
    environment:
      # ⚠️ For production, use strong credentials from environment variables
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-insecure-default}
      MONGO_INITDB_DATABASE: messwala
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - messwala

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: messwala-backend
    environment:
      # 🚨 PRODUCTION: Set NODE_ENV=production for security hardening
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5000
      MONGODB_URI: ${MONGODB_URI:-mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-insecure-default}@mongodb:27017/messwala?authSource=admin}
      # 🚨 PRODUCTION: Generate a cryptographically secure random string (min 32 chars)
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      # 🚨 PRODUCTION: Set to your production frontend URL (required)
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    ports:
      - '5000:5000'
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - messwala
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: messwala-frontend
    ports:
      - '80:80'
    depends_on:
      - backend
    environment:
      # 🚨 PRODUCTION: Set to your production backend URL
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5000}
    networks:
      - messwala
    restart: unless-stopped

volumes:
  mongodb_data:
    driver: local

networks:
  messwala:
    driver: bridge
